name: Build, Sign, Notarize & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Import Developer ID Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Create ephemeral keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Allow codesign to access keychain without password prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Build Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -scheme HealthKitExporter \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/HealthKitExporter.xcarchive" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            | xcpretty

      - name: Export Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Substitute team ID in ExportOptions.plist
          sed "s/\$(APPLE_TEAM_ID)/$APPLE_TEAM_ID/g" ExportOptions.plist > /tmp/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/HealthKitExporter.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            | xcpretty

      - name: Create DMG
        run: |
          create-dmg \
            --volname "HealthKit Exporter" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon "HealthKitExporter.app" 150 200 \
            --app-drop-link 450 200 \
            --no-internet-enable \
            --codesign "Developer ID Application" \
            "$RUNNER_TEMP/HealthKitExporter.dmg" \
            "$RUNNER_TEMP/export/HealthKitExporter.app"

      - name: Notarize DMG
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/HealthKitExporter.dmg" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple DMG
        run: xcrun stapler staple "$RUNNER_TEMP/HealthKitExporter.dmg"

      - name: Rename DMG for release
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp "$RUNNER_TEMP/HealthKitExporter.dmg" "$RUNNER_TEMP/HealthKitExporter-${VERSION}.dmg"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/HealthKitExporter-*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
